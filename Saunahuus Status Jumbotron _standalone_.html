  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

      from { opacity: 0; transform: translateX(48px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInFromLeft {
      from { opacity: 0; transform: translateX(-48px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  weatherLat:       53.0330845,
  weatherLon:       8.5581883,
  newsApiUrl:       "https://n8n2.stephanedondyas.cloud/webhook/8fe2c340-13ee-485d-8c66-710c2ef83178",        // URL returning [{lastPublished, title, body, kicker?, caption?, image?}]
  openingTimesApiUrl: "https://n8n2.stephanedondyas.cloud/webhook/0750df34-82c9-4cad-b72b-f9f630b68ab8",                             // URL returning [{zeitraum, details, "tage-der-woche"}]

// ── Data ─────────────────────────────────────────────────────────────────────

const AUFGUSS = [

  { time: "15:30", name: "Zirbe Alpenluft",  room: "Bio-Sauna",       status: "now"      },

  { time: "20:00", name: "Zitrus Frische",   room: "Finnische Sauna", status: "upcoming" },
];

// Fallback shown while the first fetch is in flight or if the network is unavailable.
const WEATHER_FALLBACK = { temp: "--", condition: "cloudy", conditionDe: "…", hi: "--", lo: "--" };

const LOAD_LEVELS = {
  gruen: {
    label: "Grünes Licht",
    head:  "Willkommen — kommen Sie gerne vorbei",
    body:  "In unserer Sauna ist noch ausreichend Platz für weitere Gäste.",
    color: "oklch(0.62 0.14 148)",
    soft:  "oklch(0.95 0.04 148)",
    ring:  "oklch(0.80 0.10 148)",
  },
  gelb: {
    label: "Gelbes Licht",
    head:  "Gut besucht — aber noch Plätze frei",
    body:  "Die Auslastung ist erhöht. Mit etwas Geduld finden Sie jedoch einen Platz.",
    color: "oklch(0.72 0.15 78)",
    soft:  "oklch(0.96 0.04 85)",
    ring:  "oklch(0.85 0.10 80)",
  },
  rot: {
    label: "Rotes Licht",
    head:  "Aktuell voll belegt",
    body:  "Wir bitten um etwas Wartezeit. Gern benachrichtigen wir Sie, sobald wieder Platz ist.",
    color: "oklch(0.60 0.18 28)",
    soft:  "oklch(0.95 0.035 28)",
    ring:  "oklch(0.80 0.12 28)",
  },
};

const WEEKDAYS_DE = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const MONTHS_DE   = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

const ACCENT = "var(--accent)";

// ── Hooks ─────────────────────────────────────────────────────────────────────

function useClock() {
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}

function useStageScale() {
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => setScale(Math.min(window.innerWidth / 1920, window.innerHeight / 1080));
    fit();
    window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);
  return scale;
}

// Maps WMO weather-code → { condition, conditionDe }
// Open-Meteo uses WMO standard codes: https://open-meteo.com/en/docs#weathervariables
function wmoToCondition(code) {
  if (code === 0)                        return { condition: "sunny",  conditionDe: "Sonnig"         };
  if (code === 1)                        return { condition: "sunny",  conditionDe: "Leicht bewölkt" };
  if (code === 2 || code === 3)          return { condition: "cloudy", conditionDe: "Bewölkt"        };
  if (code === 45 || code === 48)        return { condition: "cloudy", conditionDe: "Neblig"         };
  if (code >= 51 && code <= 55)          return { condition: "rainy",  conditionDe: "Nieselregen"    };
  if (code >= 61 && code <= 67)          return { condition: "rainy",  conditionDe: "Regen"          };
  if (code >= 71 && code <= 77)          return { condition: "rainy",  conditionDe: "Schnee"         };
  if (code >= 80 && code <= 82)          return { condition: "rainy",  conditionDe: "Regenschauer"   };
  if (code >= 85 && code <= 86)          return { condition: "rainy",  conditionDe: "Schneeschauer"  };
  if (code >= 95)                        return { condition: "rainy",  conditionDe: "Gewitter"       };
  return { condition: "cloudy", conditionDe: "Bewölkt" };
}

function useWeather(refreshKey) {
  const [weather, setWeather] = React.useState(WEATHER_FALLBACK);

  React.useEffect(() => {
    const url =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${CONFIG.weatherLat}&longitude=${CONFIG.weatherLon}` +
      `&current=temperature_2m,weather_code` +
      `&daily=temperature_2m_max,temperature_2m_min` +
      `&timezone=auto&forecast_days=1`;

    async function fetchWeather() {
      try {
        const res  = await fetch(url);
        const data = await res.json();
        const { condition, conditionDe } = wmoToCondition(data.current.weather_code);
        setWeather({
          temp:        Math.round(data.current.temperature_2m),
          hi:          Math.round(data.daily.temperature_2m_max[0]),
          lo:          Math.round(data.daily.temperature_2m_min[0]),
          condition,
          conditionDe,
        });
      } catch {
        // keep whatever was last shown (or the fallback on first load)
      }
    }

    fetchWeather();
    const id = setInterval(fetchWeather, 10 * 60 * 1000); // refresh every 10 min
    return () => clearInterval(id);
  }, [refreshKey]);

  return weather;
}

function useNews(refreshKey) {
  const [news, setNews] = React.useState(null);

  React.useEffect(() => {
    if (!CONFIG.newsApiUrl) return;

    async function fetchNews() {
      try {
        const res = await fetch(CONFIG.newsApiUrl);
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();
        console.log("Fetched news data:", data);
        const items = data[0].data ? data[0].data : [];
        if (items.length === 0) { setNews(null); return; }
        const sorted = [...items]
          .sort((a, b) => new Date(b.lastPublished) - new Date(a.lastPublished))
          .slice(0, 5);
        setNews(sorted);
      } catch {
        setNews(null);
      }
    }

    fetchNews();
    const id = setInterval(fetchNews, 5 * 60 * 1000); // refresh every 5 min
    return () => clearInterval(id);
  }, [refreshKey]);

  return news;
}

function useLoadLevel(refreshKey) {
  const [level, setLevel] = React.useState(() => {
    const base = LOAD_LEVELS[CONFIG.load] || LOAD_LEVELS.gruen;
    return { status: CONFIG.load, ...base };
  });

  React.useEffect(() => {
    if (!CONFIG.loadApiUrl) return;

    async function fetchLoad() {
      try {
        const res = await fetch(CONFIG.loadApiUrl);
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();
        const { status, items } = data;
        const s = status === 'status-rot' ? 'rot' : status === 'status-gelb' ? 'gelb' : 'gruen';
        const currentStatus = items && items.length > 0 ? items[0] : {};
        const label = currentStatus.label || LOAD_LEVELS[s]?.label || "Unbekannt";
        const head  = currentStatus.head  || LOAD_LEVELS[s]?.head  || "";
        const body  = currentStatus.body  || LOAD_LEVELS[s]?.body  || "";
        const colors = LOAD_LEVELS[s] || LOAD_LEVELS.gruen;
        setLevel({ status: s, label, head, body, color: colors.color, soft: colors.soft, ring: colors.ring });
      } catch {
        // keep whatever was last shown
      }
    }

    fetchLoad();
    const id = setInterval(fetchLoad, 2 * 60 * 1000); // refresh every 2 min
    return () => clearInterval(id);
  }, [refreshKey]);

  return level;
}

function useOpeningTimes(refreshKey) {
  const [opening, setOpening] = React.useState(null);

  React.useEffect(() => {
    if (!CONFIG.openingTimesApiUrl) return;

    async function fetchOpening() {
      try {
        const res = await fetch(CONFIG.openingTimesApiUrl);
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();
        console.log("Fetched opening times data:", data);
        const items = Array.isArray(data) ? data : (data.data || []);

        // JS getDay(): 0=Sun,1=Mon…6=Sat → ISO weekday: Mon=1…Sun=7
        const jsDay = new Date().getDay();
        const isoDay = jsDay === 0 ? 7 : jsDay;

        const match = items.find(item => {
          const days = String(item["tage-der-woche"] || "")
            .split(",")
            .map(d => parseInt(d.trim(), 10))
            .filter(d => !isNaN(d));
          return days.includes(isoDay);
        });

        if (!match) { setOpening({ closed: true }); return; }

        // Parse "HH:MM - HH:MM Uhr" → { openH, openM, closeH, closeM }
        const m = String(match.zeitraum || "").match(/(\d{1,2}):(\d{2})\s*[-–]\s*(\d{1,2}):(\d{2})/);
        setOpening({
          closed:   false,
          zeitraum: match.zeitraum,
          details:  match.details || "",
          openH:    m ? parseInt(m[1], 10) : null,
          openM:    m ? parseInt(m[2], 10) : 0,
          closeH:   m ? parseInt(m[3], 10) : 22,
          closeM:   m ? parseInt(m[4], 10) : 0,
        });
      } catch {
        setOpening(null);
      }
    }

    fetchOpening();
    const id = setInterval(fetchOpening, 30 * 60 * 1000); // refresh every 30 min
    return () => clearInterval(id);
  }, [refreshKey]);

  return opening;
}

// ── ClockBlock ────────────────────────────────────────────────────────────────

function ClockBlock() {
  const now = useClock();
  const hh   = String(now.getHours()).padStart(2, "0");
  const mm   = String(now.getMinutes()).padStart(2, "0");
  const ss   = String(now.getSeconds()).padStart(2, "0");
  const date = `${WEEKDAYS_DE[now.getDay()]}, ${now.getDate()}. ${MONTHS_DE[now.getMonth()]} ${now.getFullYear()}`;

  return (
    <div style={{
      gridArea: "clock",
      display: "flex", flexDirection: "column", justifyContent: "space-between",
      padding: "28px 36px",
      borderRight: "1px solid rgba(40,35,28,0.10)"
    }}>
      <SectionLabel>Uhrzeit</SectionLabel>
      <div>
        <div style={{
          fontFamily: "'ClashDisplay-Variable', sans-serif",
          fontWeight: 300, fontSize: 96, lineHeight: 0.95, letterSpacing: "-0.01em",
          color: "#2b2720", fontVariantNumeric: "tabular-nums",
          display: "flex", alignItems: "baseline", gap: 2
        }}>
          <span>{hh}</span>
          <span style={{ opacity: 0.3 }}>:</span>
          <span>{mm}</span>
          <span style={{ fontSize: 32, color: ACCENT, marginLeft: 10, fontVariantNumeric: "tabular-nums" }}>:{ss}</span>
        </div>
        <div style={{
          marginTop: 10, fontFamily: "'Poppins', sans-serif", fontSize: 18,
          color: "rgba(40,35,28,0.65)"
        }}>{date}</div>
      </div>
    </div>
  );
}

// ── WeatherBlock ──────────────────────────────────────────────────────────────

function WeatherGlyph({ kind, size = 56 }) {
  const stroke = "#2b2720";
  if (kind === "sunny") return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="11" stroke={stroke} strokeWidth="1.5" />
      {[0,45,90,135,180,225,270,315].map(a => {
        const r = a * Math.PI / 180;
        return <line key={a}
          x1={32 + Math.cos(r)*18} y1={32 + Math.sin(r)*18}
          x2={32 + Math.cos(r)*26} y2={32 + Math.sin(r)*26}
          stroke={stroke} strokeWidth="1.5" strokeLinecap="round" />;
      })}
    </svg>
  );
  if (kind === "cloudy") return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <circle cx="22" cy="34" r="10" stroke={stroke} strokeWidth="1.5" />
      <circle cx="36" cy="30" r="12" stroke={stroke} strokeWidth="1.5" />
      <circle cx="46" cy="36" r="8"  stroke={stroke} strokeWidth="1.5" />
      <line x1="14" y1="46" x2="52" y2="46" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" />
    </svg>
  );
  if (kind === "rainy") return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <circle cx="26" cy="28" r="10" stroke={stroke} strokeWidth="1.5" />
      <circle cx="40" cy="24" r="12" stroke={stroke} strokeWidth="1.5" />
      <line x1="22" y1="44" x2="19" y2="52" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" />
      <line x1="32" y1="44" x2="29" y2="52" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" />
      <line x1="42" y1="44" x2="39" y2="52" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" />
    </svg>
  );
  return null;
}

// ── LoadHero ──────────────────────────────────────────────────────────────────

function Thermometer({ status, color }) {
  // Mercury fill level per status (0 = empty bottom, 1 = full top)
  const fillRatio = { gruen: 0.22, gelb: 0.58, rot: 0.92 }[status] ?? 0.22;

  // SVG geometry constants (viewBox "0 0 80 290")
  const cx         = 40;
  const tubeTopY   = 16;
  const tubeBottomY= 224;   // where tube meets bulb
  const tubeH      = tubeBottomY - tubeTopY;  // 208
  const tubeInnerW = 16;
  const tubeInnerX = cx - tubeInnerW / 2;     // 32
  const bulbCY     = 256;
  const bulbOuterR = 27;
  const bulbInnerR = 20;
  const mercuryTopY = tubeBottomY - fillRatio * tubeH;

  return (
    <div style={{
      padding: "20px 22px",
      background: "#1c1a16", borderRadius: 18,
      boxShadow: "inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 40px -20px rgba(0,0,0,0.35)",
      display: "flex", alignItems: "center", justifyContent: "center"
    }}>
      <svg width="80" height="290" viewBox="0 0 80 290" style={{ overflow: "visible" }}>
        <defs>
          {/* Clip the mercury column to the inner tube shape */}
          <clipPath id="thermo-tube-clip">
            <rect x={tubeInnerX} y={tubeTopY} width={tubeInnerW} height={tubeH} rx={tubeInnerW / 2} />
          </clipPath>
        </defs>

        {/* Ambient glow radiating from bulb */}
        <circle cx={cx} cy={bulbCY} r={50}
          style={{ fill: color, opacity: 0.2, filter: "blur(14px)", transition: "fill 0.6s ease" }} />

        {/* Glass tube */}
        <rect x={cx - 15} y={10} width={30} height={218} rx={15}
          fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" strokeWidth={1} />

        {/* Glass bulb */}
        <circle cx={cx} cy={bulbCY} r={bulbOuterR}
          fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" strokeWidth={1} />

        {/* Mercury — bulb (always full) */}
        <circle cx={cx} cy={bulbCY} r={bulbInnerR}
          style={{
            fill: color,
            filter: `drop-shadow(0 0 8px ${color})`,
            transition: "fill 0.6s ease"
          }} />

        {/* Mercury — column (rises/falls with status) */}
        <g clipPath="url(#thermo-tube-clip)">
          <rect style={{
            x: tubeInnerX,
            y: mercuryTopY,
            width: tubeInnerW,
            height: tubeBottomY - mercuryTopY,
            fill: color,
            transition: "y 0.9s cubic-bezier(0.4,0,0.2,1), height 0.9s cubic-bezier(0.4,0,0.2,1), fill 0.6s ease"
          }} />
        </g>

        {/* Graduation ticks at 25 / 50 / 75 % */}
        {[0.25, 0.5, 0.75].map(t => {
          const y = tubeBottomY - t * tubeH;
          return (
            <line key={t}
              x1={cx + 9} y1={y} x2={cx + 17} y2={y}
              stroke="rgba(255,255,255,0.22)" strokeWidth={1} strokeLinecap="round" />
          );
        })}

        {/* Tube shine highlight */}
        <rect x={tubeInnerX + 2} y={14} width={5} height={210} rx={2.5}
          fill="rgba(255,255,255,0.07)" />
      </svg>
    </div>
  );
}

// ── NewsSlideshow ─────────────────────────────────────────────────────────────

function NewsSlideshow({ news, seconds }) {
  const [idx, setIdx]       = React.useState(0);
  const [prog, setProg]     = React.useState(0);
  const [dir, setDir]       = React.useState(1); // 1 = forward (right→left), -1 = backward

  // Reset to first slide whenever the news data changes.
  React.useEffect(() => { setIdx(0); setProg(0); setDir(1); }, [news]);

  React.useEffect(() => {
    if (!news || news.length === 0) return;
    setProg(0);
    const start = performance.now();
    let raf;
    const tick = t => {
      const p = Math.min(1, (t - start) / (seconds * 1000));
      setProg(p);
      if (p < 1) raf = requestAnimationFrame(tick);
      else { setDir(1); setIdx(i => (i + 1) % news.length); }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [idx, seconds, news]);

  if (!news || news.length === 0) return null;

  const safeIdx = idx % news.length;
  const item = news[safeIdx];
  const slideAnim = dir >= 0 ? "slideInFromRight 0.5s cubic-bezier(0.22,1,0.36,1) both"
                              : "slideInFromLeft  0.5s cubic-bezier(0.22,1,0.36,1) both";

  return (
    <div style={{
      gridArea: "news",
      display: "flex", flexDirection: "column",
      background: "#fff",
      border: "1px solid rgba(40,35,28,0.10)",
      borderRadius: 4,
      overflow: "hidden"
    }}>
      {/* Header row */}
      <div style={{
        padding: "22px 32px 14px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        borderBottom: "1px solid rgba(40,35,28,0.08)"
      }}>
        <SectionLabel>Was gibt's Neues?</SectionLabel>
        <div style={{ display: "flex", gap: 6 }}>
          {news.map((_, i) => (
            <div key={i} style={{
              width: 28, height: 3, borderRadius: 2,
              background: i === safeIdx ? "rgba(40,35,28,0.15)" : "rgba(40,35,28,0.07)",
              overflow: "hidden", position: "relative"
            }}>
              {i === safeIdx && (
                <div style={{
                  position: "absolute", inset: 0,
                  width: `${prog * 100}%`, background: ACCENT, borderRadius: 2
                }} />
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <div key={safeIdx} style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr", minHeight: 0, animation: slideAnim }}>
        <div style={{ padding: 24 }}>
          {item.image
            ? <img src={item.image} alt={item.caption || ""} style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: 2 }} />
            : <PlaceholderPhoto label={item.caption || ""} tone="warm" style={{ width: "100%", height: "100%" }} />
          }
        </div>
        <div style={{
          display: "flex", flexDirection: "column", justifyContent: "center",
          padding: "24px 40px 24px 8px"
        }}>
          {item.kicker && (
            <div style={{
              fontFamily: "'Poppins', sans-serif", fontSize: 13, fontWeight: 500,
              letterSpacing: "0.24em", textTransform: "uppercase", color: ACCENT
            }}>{item.kicker}</div>
          )}
          <div style={{
            marginTop: item.kicker ? 18 : 0,
            fontFamily: "'ClashDisplay-Variable', sans-serif", fontWeight: 300,
            fontSize: 48, lineHeight: 1.1, color: ACCENT, letterSpacing: "-0.005em"
          }}>{item.title}</div>
          <div style={{
            marginTop: 22,
            fontFamily: "'Poppins', sans-serif", fontSize: 17, lineHeight: 1.55,
            color: "rgba(40,35,28,0.72)", textWrap: "pretty"
          }}>{item.body}</div>
          <div style={{
            marginTop: 28, display: "flex", alignItems: "center", gap: 14,
            fontFamily: "'Poppins', sans-serif", fontSize: 13, fontWeight: 500,
            letterSpacing: "0.22em", textTransform: "uppercase",
            color: "rgba(40,35,28,0.45)"
          }}>
            <span style={{ fontVariantNumeric: "tabular-nums" }}>
              {String(safeIdx + 1).padStart(2, "0")} / {String(news.length).padStart(2, "0")}
            </span>
            <span style={{ flex: 1, height: 1, background: "rgba(40,35,28,0.12)" }} />
            <span>Mehr an der Rezeption</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ClosingBlock ──────────────────────────────────────────────────────────────

function ClosingBlock({ opening }) {
  const now = useClock();

  const closeH = opening && !opening.closed && opening.closeH != null ? opening.closeH : 22;
  const closeM = opening && !opening.closed && opening.closeM != null ? opening.closeM : 0;
  const close = new Date(now); close.setHours(closeH, closeM, 0, 0);
  let remaining = close - now;
  if (remaining < 0) remaining += 24 * 3600 * 1000;
  const remH = Math.floor(remaining / 3600000);
  const remM = Math.floor(remaining % 3600000 / 60000);

  const isClosed = opening && opening.closed;

  // Format display time as "HH:MM — HH:MM" from parsed hours, or fall back to raw zeitraum
  let zeitraumDisplay = "- -";
  if (opening && !opening.closed) {
    if (opening.openH != null) {
      const fmt = (h, m) => `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      zeitraumDisplay = `${fmt(opening.openH, opening.openM)} — ${fmt(opening.closeH, opening.closeM)}`;
    } else if (opening.zeitraum) {
      zeitraumDisplay = opening.zeitraum;
    }
  }

  return (
    <div style={{
      gridArea: "closing",
      padding: "26px 32px",
      background: "oklch(0.93 0.02 312)",
      borderRadius: 4,
      display: "flex", flexDirection: "column", justifyContent: "space-between"
    }}>
      <SectionLabel>Öffnungszeiten heute</SectionLabel>
      <div>
        <div style={{
          fontFamily: "'ClashDisplay-Variable', sans-serif", fontWeight: 300,
          fontSize: isClosed ? 40 : 56, lineHeight: 1, color: ACCENT, fontVariantNumeric: "tabular-nums"
        }}>
          {isClosed ? "Heute geschlossen" : zeitraumDisplay}
        </div>
        {!isClosed && opening && opening.details && (
          <div style={{
            marginTop: 14,
            fontFamily: "'Poppins', sans-serif", fontSize: 15, lineHeight: 1.5,
            color: "rgba(40,35,28,0.72)"
          }}>
            {opening.details}
          </div>
        )}
        {!opening && (
          <div style={{
            marginTop: 14,
            fontFamily: "'Poppins', sans-serif", fontSize: 15, lineHeight: 1.5,
            color: "rgba(40,35,28,0.72)"
          }}>
            Letzter Einlass um 21:00 · Saunagänge bis 21:30.
          </div>
        )}
      </div>
      <div>
        {!isClosed && (
        <div style={{
          paddingTop: 14, borderTop: "1px solid rgba(40,35,28,0.12)",
          display: "flex", alignItems: "baseline", justifyContent: "space-between",
          fontFamily: "'Poppins', sans-serif", fontSize: 13,
          letterSpacing: "0.08em", color: "rgba(40,35,28,0.6)"
        }}>
          <span>Noch geöffnet</span>
          <span style={{
            fontFamily: "'ClashDisplay-Variable', sans-serif", fontSize: 24, fontWeight: 300,
            color: "#2b2720", fontVariantNumeric: "tabular-nums"
          }}>{remH} Std {String(remM).padStart(2, "0")} Min</span>
        </div>
      )}
      </div>
    </div>
  );
}

  const news    = useNews(refreshKey);
  const level   = useLoadLevel(refreshKey);
  const opening = useOpeningTimes(refreshKey);
  const hasNews = news !== null && news.length > 0;

  return (
    <div style={{
      position: "fixed", inset: 0, background: "#ece6dc", overflow: "hidden",
      display: "flex", alignItems: "center", justifyContent: "center"
    }}>
      <div style={{ width: 1920 * scale, height: 1080 * scale, position: "relative" }}>
        <div style={{
          width: 1920, height: 1080,
          transform: `scale(${scale})`, transformOrigin: "top left",
          position: "absolute", top: 0, left: 0,

          <TopBar onRefresh={handleRefresh} />

          {/* Main grid */}

            padding: "28px 64px 0",
            display: "grid",

}
